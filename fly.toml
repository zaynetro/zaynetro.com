# fly.toml app configuration file generated for zaynetro-com on 2026-04-03T21:41:30+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'zaynetro-com'
primary_region = 'ams'

[build]

[env]
  PORT = '8000'

[processes]
  app = 'task production'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
